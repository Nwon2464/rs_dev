<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>장비 개방 옵션 · 변환기별</title>

  <!--
    Codex implementation notes
    ==========================
    1. 이 파일은 승인된 UI/UX를 재현한 self-contained HTML mockup입니다.
    2. 외부 프레임워크나 외부 폰트를 사용하지 않습니다.
    3. 실제 저장소에 적용할 때에는 아래 MOCK_ROWS를 CSV/JSON 로딩 결과로 교체하세요.
    4. 장비 → 변환기 → 등급 → 개방 줄 순으로 필터가 적용됩니다.
    5. 변환기는 한 번에 하나만 선택하며, 표에는 해당 변환기의 확률 하나만 표시합니다.
    6. section_group, source block, file offset 등 개발자 데이터는 사용자 화면에 표시하지 않습니다.
    7. 결과는 개방 줄별 section으로 그룹화됩니다.
    8. 개방 줄은 복수 선택이 가능하며 선택한 줄만 결과에 표시됩니다.
    9. 기본 테마는 짙은 슬레이트·블루그레이 기반의 사용자용 다크 UI입니다.
    10. 개방 줄 버튼은 다시 클릭하면 해제되며, 선택 항목이 0개일 수도 있습니다.
  -->

  <style>
    :root {
      color-scheme: dark;
      --bg: #10141b;
      --bg-elevated: #141a23;
      --panel: #18202a;
      --panel-2: #1d2632;
      --panel-3: #232e3b;
      --line: #2f3b49;
      --line-strong: #415064;
      --text: #f2f5f8;
      --text-soft: #cbd4de;
      --muted: #8e9aa8;
      --accent: #2fb7a8;
      --accent-strong: #59d1c4;
      --accent-soft: rgba(47, 183, 168, 0.14);
      --accent-border: rgba(89, 209, 196, 0.48);
      --gold: #d2a85e;
      --blue: #6ca7d9;
      --purple: #a88bce;
      --danger: #e27d7d;
      --shadow: 0 16px 44px rgba(0, 0, 0, 0.28);
      --radius-xl: 18px;
      --radius-lg: 14px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --content-width: 1720px;
    }

    html[data-theme="light"] {
      color-scheme: light;
      --bg: #e9edf1;
      --bg-elevated: #f0f3f5;
      --panel: #f8fafb;
      --panel-2: #f1f4f6;
      --panel-3: #e7ecef;
      --line: #d3dbe1;
      --line-strong: #bcc8d0;
      --text: #1d2833;
      --text-soft: #40505e;
      --muted: #71808d;
      --accent: #138f82;
      --accent-strong: #0d746b;
      --accent-soft: rgba(19, 143, 130, 0.12);
      --accent-border: rgba(19, 143, 130, 0.38);
      --gold: #9f7527;
      --blue: #367ba9;
      --purple: #7150a0;
      --danger: #b95757;
      --shadow: 0 14px 36px rgba(34, 48, 60, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 320px;
      background:
        radial-gradient(circle at 18% -12%, rgba(47, 183, 168, 0.08), transparent 30%),
        radial-gradient(circle at 86% -8%, rgba(108, 167, 217, 0.06), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family:
        Inter, Pretendard, "Noto Sans KR", "Segoe UI", system-ui,
        -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .app-shell {
      width: min(100%, var(--content-width));
      margin: 0 auto;
      padding: 30px 28px 44px;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    .title-wrap {
      min-width: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .page-title {
      margin-bottom: 6px;
      font-size: clamp(28px, 2.2vw, 40px);
      line-height: 1.2;
      letter-spacing: -0.035em;
      font-weight: 820;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .outline-button,
    .icon-button {
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.015);
      border-radius: 999px;
      cursor: pointer;
      transition:
        border-color 150ms ease,
        background 150ms ease,
        transform 150ms ease;
    }

    .outline-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 16px;
      color: var(--text-soft);
      font-weight: 700;
    }

    .outline-button:hover,
    .icon-button:hover {
      border-color: var(--accent-border);
      background: var(--accent-soft);
    }

    .outline-button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .selection-panel {
      display: grid;
      grid-template-columns:
        minmax(300px, 1.35fr)
        minmax(250px, 0.95fr)
        minmax(220px, 0.72fr)
        minmax(340px, 1.2fr);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.018), transparent 38%),
        var(--panel);
      box-shadow: var(--shadow);
    }

    .filter-group {
      min-width: 0;
      padding: 20px;
    }

    .filter-group + .filter-group {
      border-left: 1px solid var(--line);
    }

    .filter-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      font-size: 15px;
      font-weight: 780;
    }

    .step-number {
      display: inline-grid;
      place-items: center;
      width: 29px;
      height: 29px;
      border: 1px solid rgba(33, 199, 183, 0.18);
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 850;
      flex: 0 0 auto;
    }

    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip-list {
      display: grid;
      gap: 7px;
    }

    .chip,
    .converter-chip,
    .grade-chip,
    .line-chip {
      border: 1px solid var(--line);
      background: var(--panel-2);
      cursor: pointer;
      transition:
        border-color 150ms ease,
        background 150ms ease,
        color 150ms ease,
        box-shadow 150ms ease,
        transform 150ms ease;
    }

    .chip:hover,
    .converter-chip:hover,
    .grade-chip:hover,
    .line-chip:hover {
      border-color: var(--line-strong);
      background: var(--panel-3);
    }

    .chip[aria-pressed="true"],
    .converter-chip[aria-pressed="true"],
    .grade-chip[aria-pressed="true"],
    .line-chip[aria-pressed="true"] {
      border-color: var(--accent-border);
      background:
        linear-gradient(180deg, rgba(33, 199, 183, 0.18), rgba(33, 199, 183, 0.10)),
        var(--panel-2);
      color: var(--accent-strong);
      box-shadow:
        inset 0 0 0 1px rgba(33, 199, 183, 0.12),
        0 0 0 1px rgba(33, 199, 183, 0.04);
    }

    .chip {
      min-height: 39px;
      padding: 0 13px;
      border-radius: var(--radius-sm);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 690;
    }

    .chip-icon {
      margin-right: 7px;
      color: var(--muted);
    }

    .chip[aria-pressed="true"] .chip-icon {
      color: var(--accent-strong);
    }

    .converter-chip,
    .grade-chip {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 42px;
      padding: 0 13px;
      border-radius: var(--radius-sm);
      color: var(--text-soft);
      text-align: left;
      font-size: 13px;
      font-weight: 710;
    }

    .converter-chip::before,
    .grade-chip::before {
      content: "";
      width: 17px;
      height: 17px;
      margin-right: 10px;
      border: 2px solid currentColor;
      border-radius: 50%;
      opacity: 0.88;
      flex: 0 0 auto;
    }

    .grade-chip:nth-child(2)::before {
      border-radius: 4px;
      color: var(--purple);
      transform: rotate(45deg) scale(0.82);
    }

    .grade-chip:nth-child(3)::before {
      border-radius: 4px;
      color: var(--gold);
      transform: rotate(45deg) scale(0.82);
    }

    .chip,
    .converter-chip,
    .grade-chip {
      position: relative;
    }

    .chip[aria-pressed="true"],
    .converter-chip[aria-pressed="true"],
    .grade-chip[aria-pressed="true"] {
      padding-right: 36px;
    }

    .chip[aria-pressed="true"]::after,
    .converter-chip[aria-pressed="true"]::after,
    .grade-chip[aria-pressed="true"]::after {
      content: "✓";
      position: absolute;
      top: 50%;
      right: 9px;
      display: grid;
      place-items: center;
      width: 19px;
      height: 19px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: var(--accent);
      color: #ffffff;
      font-size: 12px;
      font-weight: 950;
      box-shadow: 0 0 0 3px rgba(33, 199, 183, 0.11);
    }

    .line-scroller {
      overflow: visible;
      padding-bottom: 0;
    }

    .line-list {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
      min-width: 0;
    }

    .line-chip {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 88px;
      padding: 10px 5px;
      border-radius: var(--radius-md);
      color: var(--text-soft);
      text-align: center;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 740;
    }

    .line-chip .line-icon {
      display: block;
      margin-bottom: 7px;
      font-size: 19px;
      color: var(--muted);
    }

    .line-chip[aria-pressed="true"] .line-icon {
      color: var(--accent-strong);
    }

    .multi-select-hint {
      margin-left: auto;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
    }

    .line-chip {
      position: relative;
    }

    .line-chip[aria-pressed="true"]::after {
      content: "✓";
      position: absolute;
      top: 7px;
      right: 7px;
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      color: #ffffff;
      font-size: 11px;
      font-weight: 950;
    }

    .line-chip[aria-pressed="false"] {
      opacity: 0.82;
    }

    .line-chip[aria-pressed="false"]:hover {
      opacity: 1;
    }

    .line-chip[aria-pressed="true"] {
      box-shadow:
        inset 0 0 0 1px rgba(89, 209, 196, 0.10),
        0 0 0 1px rgba(47, 183, 168, 0.04);
    }

    .context-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(240px, 330px);
      align-items: center;
      gap: 18px;
      margin: 14px 2px 10px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .breadcrumb-home {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      margin-right: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text-soft);
      flex: 0 0 auto;
    }

    .breadcrumb-label {
      margin-right: 10px;
      color: var(--text-soft);
      white-space: nowrap;
    }

    .breadcrumb-path {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 8px;
      overflow-x: auto;
      padding: 3px 1px 5px;
      scrollbar-width: thin;
      scrollbar-color: var(--line-strong) transparent;
    }

    .breadcrumb-step {
      display: grid;
      grid-template-columns: 22px minmax(0, auto);
      grid-template-areas:
        "number source"
        "number value";
      align-items: center;
      column-gap: 8px;
      min-width: max-content;
      padding: 7px 10px 7px 8px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel);
    }

    .breadcrumb-step-number {
      grid-area: number;
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 11px;
      font-weight: 900;
    }

    .breadcrumb-step-source {
      grid-area: source;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.15;
      font-weight: 720;
    }

    .breadcrumb-step-value {
      grid-area: value;
      color: var(--text);
      font-size: 13px;
      line-height: 1.25;
      font-weight: 780;
    }

    .breadcrumb-separator {
      color: var(--muted);
      font-size: 17px;
      flex: 0 0 auto;
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      min-height: 43px;
      padding: 0 44px 0 43px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      outline: none;
      background: var(--panel);
      color: var(--text);
      transition:
        border-color 150ms ease,
        box-shadow 150ms ease;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-input:focus {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px rgba(33, 199, 183, 0.10);
    }

    .clear-search {
      position: absolute;
      top: 50%;
      right: 7px;
      display: none;
      width: 30px;
      height: 30px;
      transform: translateY(-50%);
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .clear-search.visible {
      display: grid;
      place-items: center;
    }

    .result-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--line);
    }

    .result-title-row {
      display: flex;
      align-items: flex-start;
      gap: 13px;
    }

    .result-symbol {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 20px;
      flex: 0 0 auto;
    }

    .result-title {
      margin-bottom: 3px;
      font-size: 23px;
      letter-spacing: -0.025em;
      font-weight: 820;
    }

    .result-description {
      color: var(--muted);
      font-size: 13px;
    }

    .summary-counts {
      display: flex;
      align-items: baseline;
      gap: 12px;
      white-space: nowrap;
    }

    .summary-primary {
      color: var(--accent-strong);
      font-size: 28px;
      font-weight: 850;
      letter-spacing: -0.03em;
    }

    .summary-divider {
      color: var(--line-strong);
    }

    .summary-secondary {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .empty-state {
      display: none;
      padding: 70px 24px;
      color: var(--muted);
      text-align: center;
    }

    .empty-state.visible {
      display: block;
    }

    #resultSections {
      display: grid;
      gap: 20px;
      padding: 18px;
      background: var(--bg-elevated);
    }

    .line-section {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .line-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 15px 20px;
      background: var(--panel-2);
    }

    .line-section-title {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 15px;
      font-weight: 790;
    }

    .line-section-title::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(33, 199, 183, 0.10);
    }

    .line-row-count {
      color: var(--muted);
      font-size: 12px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      padding: 12px 18px;
      background: var(--panel-3);
      color: var(--muted);
      text-align: left;
      font-size: 11px;
      letter-spacing: 0.02em;
      font-weight: 780;
    }

    tbody td {
      padding: 12px 18px;
      border-top: 1px solid var(--line);
      color: var(--text-soft);
      vertical-align: middle;
      font-size: 13px;
    }

    tbody tr {
      cursor: default;
      transition: background 140ms ease;
    }

    tbody tr:hover {
      background: rgba(33, 199, 183, 0.045);
    }

    .col-effect { width: 38%; }
    .col-name { width: 23%; }
    .col-tier { width: 14%; }
    .col-probability { width: 17%; }
    .col-candidate { width: 8%; text-align: center; }

    .option-effect {
      display: flex;
      align-items: center;
      gap: 11px;
      color: var(--text);
      font-size: 14px;
      font-weight: 730;
    }

    .option-glyph {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--accent-strong);
      font-size: 11px;
      flex: 0 0 auto;
    }

    .tier-badge {
      display: inline-flex;
      align-items: center;
      min-height: 27px;
      padding: 0 10px;
      border: 1px solid rgba(215, 172, 85, 0.46);
      border-radius: 8px;
      background: rgba(215, 172, 85, 0.08);
      color: var(--gold);
      font-weight: 760;
      white-space: nowrap;
    }

    .tier-badge.tier-2 {
      border-color: rgba(78, 179, 255, 0.50);
      background: rgba(78, 179, 255, 0.08);
      color: var(--blue);
    }

    .probability-cell {
      display: flex;
      align-items: center;
    }

    .probability-value {
      display: inline-flex;
      align-items: center;
      min-width: 62px;
      min-height: 30px;
      padding: 0 11px;
      border: 1px solid rgba(33, 199, 183, 0.24);
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 820;
      font-variant-numeric: tabular-nums;
    }

    .candidate-value {
      color: var(--text-soft);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .active-summary {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .reset-button {
      border: 0;
      background: transparent;
      color: var(--accent-strong);
      font-weight: 720;
      cursor: pointer;
    }

    .reset-button:hover {
      text-decoration: underline;
    }

    @media (max-width: 1220px) {
      .selection-panel {
        grid-template-columns: 1fr 1fr;
      }

      .filter-group:nth-child(3) {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .filter-group:nth-child(4) {
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        padding: 20px 14px 30px;
      }

      .page-header {
        align-items: stretch;
        flex-direction: column;
      }

      .header-actions {
        justify-content: flex-end;
      }

      .selection-panel {
        grid-template-columns: 1fr;
      }

      .line-list {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .line-chip {
        min-height: 74px;
        padding: 8px 3px;
        font-size: 11px;
      }

      .filter-group + .filter-group {
        border-top: 1px solid var(--line);
        border-left: 0;
      }

      .context-row {
        grid-template-columns: 1fr;
      }

      .search-wrap {
        width: min(100%, 330px);
        justify-self: end;
      }

      .result-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary-counts {
        align-self: flex-end;
      }

      .status-bar {
        align-items: flex-start;
        flex-direction: column;
      }
    }


    @media (max-width: 480px) {
      .line-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .line-chip:first-child {
        grid-column: 1 / -1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <main class="app-shell">
    <header class="page-header">
      <div class="title-wrap">
        <h1 class="page-title">장비 개방 옵션 · 변환기별</h1>
        <p class="page-subtitle">
          변환기 종류별로 확률 필드를 분리한 원본 DAT 직접 조인 결과입니다.
        </p>
      </div>

      <div class="header-actions">
        <button class="outline-button" id="themeToggle" type="button">
          <span aria-hidden="true">☾</span>
          <span id="themeToggleLabel">라이트 모드로 전환</span>
        </button>
      </div>
    </header>

    <section class="selection-panel" aria-label="옵션 탐색 조건">
      <section class="filter-group">
        <h2 class="filter-heading">
          <span class="step-number">1</span>
          장비 선택
        </h2>
        <div class="chip-grid" id="equipmentFilters"></div>
      </section>

      <section class="filter-group">
        <h2 class="filter-heading">
          <span class="step-number">2</span>
          변환기 선택
        </h2>
        <div class="chip-list" id="converterFilters"></div>
      </section>

      <section class="filter-group">
        <h2 class="filter-heading">
          <span class="step-number">3</span>
          아이템 등급
        </h2>
        <div class="chip-list" id="gradeFilters"></div>
      </section>

      <section class="filter-group">
        <h2 class="filter-heading">
          <span class="step-number">4</span>
          개방 줄
          <span class="multi-select-hint">복수 선택 가능</span>
        </h2>
        <div class="line-scroller">
          <div class="line-list" id="lineFilters"></div>
        </div>
      </section>
    </section>

    <section class="context-row" aria-label="현재 위치와 검색">
      <nav class="breadcrumb" aria-label="현재 선택 경로">
        <span class="breadcrumb-home" aria-hidden="true">⌂</span>
        <span class="breadcrumb-label">현재 위치</span>
        <span class="breadcrumb-path" id="breadcrumbPath"></span>
      </nav>

      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input
          class="search-input"
          id="searchInput"
          type="search"
          autocomplete="off"
          placeholder="현재 목록에서 옵션 검색"
          aria-label="현재 목록에서 옵션 검색"
        />
        <button class="clear-search" id="clearSearch" type="button" aria-label="검색어 지우기">×</button>
      </div>
    </section>

    <section class="result-card" aria-labelledby="resultTitle">
      <header class="result-header">
        <div class="result-title-row">
          <span class="result-symbol" aria-hidden="true">✦</span>
          <div>
            <h2 class="result-title" id="resultTitle">전체 개방 줄 옵션</h2>
            <p class="result-description">
              선택한 조건에서 등장할 수 있는 옵션과 변환 확률을 확인할 수 있습니다.
            </p>
          </div>
        </div>

        <div class="summary-counts" aria-live="polite">
          <strong class="summary-primary" id="rowCount">0개</strong>
          <span class="summary-divider">|</span>
          <span class="summary-secondary" id="uniqueOptionCount">0개 옵션</span>
        </div>
      </header>

      <div id="resultSections"></div>

      <div class="empty-state" id="emptyState">
        조건에 맞는 옵션이 없습니다. 다른 조건이나 검색어를 선택해 주세요.
      </div>

      <footer class="status-bar">
        <span class="active-summary" id="activeSummary"></span>
        <button class="reset-button" id="resetButton" type="button">선택 초기화</button>
      </footer>
    </section>
  </main>

  <script>
    /*
      실제 프로젝트 적용 시 MOCK_ROWS를 CSV 파싱 결과로 교체하세요.

      권장 필드 매핑 예:
      equipment_bucket   -> equipment
      converter label    -> converter
      grade_code/name    -> grade
      open_slot          -> line
      option_name        -> optionName
      option_tier        -> tier
      candidate_index    -> candidate
      선택 변환기 확률   -> probability

      변환기별 확률 필드가 한 row에 여러 개 있다면:
      probabilities: {
        "일반 변환기": Number(row.normal_probability),
        "개량된 변환기": Number(row.improved_probability),
        ...
      }
      형태로 변환하면 아래 UI 로직을 그대로 사용할 수 있습니다.
    */

    const EQUIPMENT = [
      "공용 갑옷",
      "관",
      "귀걸이/망토",
      "목걸이",
      "무기",
      "벨트",
      "부츠",
      "장갑/팔찌",
      "전용 갑옷",
      "피리",
      "헬멧"
    ];

    const CONVERTERS = [
      "일반 변환기",
      "개량된 변환기",
      "모조 변환기",
      "불타는 변환기",
      "협회 변환기"
    ];

    const GRADES = [
      { code: "7", label: "7 · 유니크" },
      { code: "8", label: "8 · DX 유니크" },
      { code: "9", label: "9 · ULT 유니크" }
    ];

    const LINES = [
      { value: "ALL", label: "ALL", icon: "▤" },
      { value: "1", label: "1번째\n개방 줄", icon: "1" },
      { value: "2", label: "2번째\n개방 줄", icon: "2" },
      { value: "3", label: "3번째\n개방 줄", icon: "3" },
      { value: "4", label: "4번째\n개방 줄", icon: "4" }
    ];

    const BASE_OPTIONS = [
      { effect: "힘 +68", optionName: "힘상승", tier: 1, candidate: 1, base: 7 },
      { effect: "힘 +81", optionName: "힘상승", tier: 2, candidate: 10, base: 5 },
      { effect: "지혜 +68", optionName: "지혜상승", tier: 1, candidate: 4, base: 7 },
      { effect: "민첩 +68", optionName: "민첩성상승", tier: 1, candidate: 2, base: 7 },
      { effect: "건강 +68", optionName: "건강상승", tier: 1, candidate: 3, base: 7 },
      { effect: "모든 능력치 +34", optionName: "모든능력치증가", tier: 1, candidate: 8, base: 3 },
      { effect: "HP 회복 +72", optionName: "HP회복", tier: 1, candidate: 5, base: 2 },
      { effect: "마력 +68", optionName: "마력상승", tier: 1, candidate: 6, base: 7 },
      { effect: "방어력 +68", optionName: "방어력상승", tier: 1, candidate: 7, base: 7 }
    ];

    const CONVERTER_FACTOR = {
      "일반 변환기": 1,
      "개량된 변환기": 1.18,
      "모조 변환기": 0.82,
      "불타는 변환기": 1.08,
      "협회 변환기": 0.92
    };

    const MOCK_ROWS = [];

    for (const equipment of EQUIPMENT) {
      for (const grade of GRADES) {
        for (let line = 1; line <= 4; line += 1) {
          BASE_OPTIONS.forEach((option, index) => {
            const equipmentFactor = equipment === "헬멧" ? 1 : 0.92;
            const gradeFactor = grade.code === "7" ? 1 : grade.code === "8" ? 0.88 : 0.76;
            const lineFactor = 1 - (line - 1) * 0.07;

            const probabilities = Object.fromEntries(
              CONVERTERS.map((converter) => {
                const value =
                  option.base *
                  equipmentFactor *
                  gradeFactor *
                  lineFactor *
                  CONVERTER_FACTOR[converter];

                return [converter, Math.max(0.1, Number(value.toFixed(2)))];
              })
            );

            MOCK_ROWS.push({
              equipment,
              grade: grade.label,
              gradeCode: grade.code,
              line: String(line),
              effect: option.effect,
              optionName: option.optionName,
              tier: option.tier,
              candidate: option.candidate + (line - 1) * BASE_OPTIONS.length,
              probabilities,
              optionKey: `${option.optionName}-${option.tier}-${index}`
            });
          });
        }
      }
    }

    const ALL_LINE_VALUES = ["1", "2", "3", "4"];

    const DEFAULT_STATE = {
      equipment: "피리",
      converter: "일반 변환기",
      grade: "9 · ULT 유니크",
      selectedLines: ["2"],
      query: ""
    };

    const state = {
      ...DEFAULT_STATE,
      selectedLines: [...DEFAULT_STATE.selectedLines]
    };

    const equipmentIcons = {
      "공용 갑옷": "◫",
      "관": "♔",
      "귀걸이/망토": "◇",
      "목걸이": "◌",
      "무기": "†",
      "벨트": "⊏",
      "부츠": "∟",
      "장갑/팔찌": "✤",
      "전용 갑옷": "▣",
      "피리": "♪",
      "헬멧": "◉"
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[character]);
    }

    function createButton({
      className,
      label,
      pressed,
      onClick,
      innerHtml
    }) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = className;
      button.setAttribute("aria-pressed", String(pressed));
      button.setAttribute("aria-label", label);
      button.innerHTML = innerHtml ?? escapeHtml(label);
      button.addEventListener("click", onClick);
      return button;
    }

    function renderEquipmentFilters() {
      const target = $("equipmentFilters");
      target.replaceChildren();

      EQUIPMENT.forEach((equipment) => {
        target.appendChild(
          createButton({
            className: "chip",
            label: equipment,
            pressed: state.equipment === equipment,
            innerHtml:
              `<span class="chip-icon" aria-hidden="true">${escapeHtml(equipmentIcons[equipment] ?? "•")}</span>` +
              escapeHtml(equipment),
            onClick: () => {
              state.equipment = equipment;
              render();
            }
          })
        );
      });
    }

    function renderConverterFilters() {
      const target = $("converterFilters");
      target.replaceChildren();

      CONVERTERS.forEach((converter) => {
        target.appendChild(
          createButton({
            className: "converter-chip",
            label: converter,
            pressed: state.converter === converter,
            onClick: () => {
              state.converter = converter;
              render();
            }
          })
        );
      });
    }

    function renderGradeFilters() {
      const target = $("gradeFilters");
      target.replaceChildren();

      GRADES.forEach((grade) => {
        target.appendChild(
          createButton({
            className: "grade-chip",
            label: grade.label,
            pressed: state.grade === grade.label,
            onClick: () => {
              state.grade = grade.label;
              render();
            }
          })
        );
      });
    }

    function allLinesSelected() {
      return ALL_LINE_VALUES.every((line) => state.selectedLines.includes(line));
    }

    function sortedSelectedLines() {
      return [...state.selectedLines].sort((a, b) => Number(a) - Number(b));
    }

    function selectedLineLabel() {
      const lines = sortedSelectedLines();

      if (lines.length === 0) {
        return "선택 없음";
      }

      if (lines.length === ALL_LINE_VALUES.length) {
        return "전체 개방 줄";
      }

      if (lines.length === 1) {
        return `${lines[0]}번째 개방 줄`;
      }

      return `${lines.map((line) => `${line}번째`).join(" · ")} 개방 줄`;
    }

    function toggleLine(lineValue) {
      if (lineValue === "ALL") {
        state.selectedLines = allLinesSelected()
          ? []
          : [...ALL_LINE_VALUES];
        render();
        return;
      }

      const isSelected = state.selectedLines.includes(lineValue);

      state.selectedLines = isSelected
        ? state.selectedLines.filter((line) => line !== lineValue)
        : [...state.selectedLines, lineValue].sort(
            (a, b) => Number(a) - Number(b)
          );

      render();
    }

    function renderLineFilters() {
      const target = $("lineFilters");
      target.replaceChildren();

      LINES.forEach((line) => {
        const isPressed =
          line.value === "ALL"
            ? allLinesSelected()
            : state.selectedLines.includes(line.value);

        const visibleLabel = escapeHtml(line.label).replace("\\n", "<br>");

        target.appendChild(
          createButton({
            className: "line-chip",
            label: line.label.replace("\\n", " "),
            pressed: isPressed,
            innerHtml:
              `<span class="line-icon" aria-hidden="true">${escapeHtml(line.icon)}</span>` +
              visibleLabel,
            onClick: () => toggleLine(line.value)
          })
        );
      });
    }

    function filteredRows() {
      const normalizedQuery = state.query.trim().toLowerCase();

      return MOCK_ROWS.filter((row) => {
        if (row.equipment !== state.equipment) return false;
        if (row.grade !== state.grade) return false;
        if (!state.selectedLines.includes(row.line)) return false;

        if (!normalizedQuery) return true;

        return [
          row.effect,
          row.optionName,
          row.tier,
          row.candidate
        ].join(" ").toLowerCase().includes(normalizedQuery);
      });
    }

    function renderBreadcrumb() {
      const items = [
        {
          number: "1",
          source: "장비 선택",
          value: state.equipment
        },
        {
          number: "2",
          source: "변환기 선택",
          value: state.converter
        },
        {
          number: "3",
          source: "아이템 등급",
          value: state.grade
        },
        {
          number: "4",
          source: "개방 줄",
          value: selectedLineLabel()
        }
      ];

      $("breadcrumbPath").innerHTML = items.map((item, index) => {
        const separator =
          index === 0
            ? ""
            : '<span class="breadcrumb-separator" aria-hidden="true">›</span>';

        return (
          separator +
          `<span class="breadcrumb-step">` +
            `<span class="breadcrumb-step-number">${escapeHtml(item.number)}</span>` +
            `<span class="breadcrumb-step-source">${escapeHtml(item.source)}</span>` +
            `<span class="breadcrumb-step-value">${escapeHtml(item.value)}</span>` +
          `</span>`
        );
      }).join("");
    }

    function probabilityFor(row) {
      return Number(row.probabilities[state.converter] ?? 0);
    }

    function groupedByLine(rows) {
      return rows.reduce((groups, row) => {
        if (!groups[row.line]) groups[row.line] = [];
        groups[row.line].push(row);
        return groups;
      }, {});
    }

    function renderTable(rows) {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="col-effect">옵션 효과</th>
                <th class="col-name">옵션명</th>
                <th class="col-tier">단계</th>
                <th class="col-probability">변환 확률</th>
                <th class="col-candidate">후보</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row) => {
                const probability = probabilityFor(row);
                return `
                  <tr>
                    <td>
                      <div class="option-effect">
                        <span class="option-glyph" aria-hidden="true">◇</span>
                        <span>${escapeHtml(row.effect)}</span>
                      </div>
                    </td>
                    <td>${escapeHtml(row.optionName)}</td>
                    <td>
                      <span class="tier-badge ${row.tier === 2 ? "tier-2" : ""}">
                        ${escapeHtml(row.tier)}단계
                      </span>
                    </td>
                    <td>
                      <div class="probability-cell">
                        <span class="probability-value">${probability.toFixed(
                          probability % 1 === 0 ? 0 : 2
                        )}%</span>
                      </div>
                    </td>
                    <td class="candidate-value">${escapeHtml(row.candidate)}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderResults() {
      const rows = filteredRows();
      const target = $("resultSections");
      const emptyState = $("emptyState");

      const uniqueOptionCount = new Set(
        rows.map((row) => row.optionKey)
      ).size;

      $("rowCount").textContent = `${rows.length.toLocaleString()}개`;
      $("uniqueOptionCount").textContent =
        `${uniqueOptionCount.toLocaleString()}개 옵션`;

      const selectedLines = sortedSelectedLines();

      const title =
        selectedLines.length === 0
          ? "개방 줄을 선택하세요"
          : selectedLines.length === ALL_LINE_VALUES.length
            ? "전체 개방 줄 옵션"
            : `${selectedLineLabel()} 옵션`;

      $("resultTitle").textContent = title;

      if (!rows.length) {
        target.replaceChildren();
        emptyState.textContent =
          state.selectedLines.length === 0
            ? "확인할 개방 줄을 하나 이상 선택해 주세요."
            : "조건에 맞는 옵션이 없습니다. 다른 조건이나 검색어를 선택해 주세요.";
        emptyState.classList.add("visible");
        return;
      }

      emptyState.classList.remove("visible");

      const groups = groupedByLine(rows);
      const orderedLines = sortedSelectedLines();

      target.innerHTML = orderedLines
        .filter((line) => groups[line]?.length)
        .map((line) => `
          <section class="line-section">
            <header class="line-section-header">
              <h3 class="line-section-title">${escapeHtml(line)}번째 개방 줄</h3>
              <span class="line-row-count">${groups[line].length}개 후보</span>
            </header>
            ${renderTable(groups[line])}
          </section>
        `)
        .join("");
    }

    function renderStatus() {
      $("activeSummary").textContent =
        `${state.equipment} · ${state.converter} · ${state.grade} · ${selectedLineLabel()}`;
    }

    function render() {
      renderEquipmentFilters();
      renderConverterFilters();
      renderGradeFilters();
      renderLineFilters();
      renderBreadcrumb();
      renderResults();
      renderStatus();

      const clearSearch = $("clearSearch");
      clearSearch.classList.toggle("visible", Boolean(state.query));
    }

    function setTheme(theme) {
      document.documentElement.dataset.theme = theme;
      const isDark = theme === "dark";
      $("themeToggleLabel").textContent =
        isDark ? "라이트 모드로 전환" : "다크 모드로 전환";
      $("themeToggle").querySelector("span").textContent = isDark ? "☾" : "☀";

      try {
        localStorage.setItem("redstone-ui-theme", theme);
      } catch (error) {
        console.warn("Theme preference could not be saved.", error);
      }
    }

    $("themeToggle").addEventListener("click", () => {
      const current = document.documentElement.dataset.theme;
      setTheme(current === "dark" ? "light" : "dark");
    });

    $("searchInput").addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    $("clearSearch").addEventListener("click", () => {
      state.query = "";
      $("searchInput").value = "";
      $("searchInput").focus();
      render();
    });

    $("resetButton").addEventListener("click", () => {
      Object.assign(state, DEFAULT_STATE);
      state.selectedLines = [...DEFAULT_STATE.selectedLines];
      $("searchInput").value = "";
      render();
    });

    try {
      const savedTheme = localStorage.getItem("redstone-ui-theme");
      if (savedTheme === "light" || savedTheme === "dark") {
        setTheme(savedTheme);
      }
    } catch (error) {
      console.warn("Theme preference could not be loaded.", error);
    }

    render();
  </script>
</body>
</html>
