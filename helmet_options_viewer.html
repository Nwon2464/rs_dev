<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Helmet Open Options</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #69707a;
      --line: #d9dee7;
      --accent: #0f6b63;
      --accent-soft: #e1f3ef;
      --warn: #8a4b0f;
      --warn-soft: #fff1dc;
      --shadow: 0 1px 2px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246, 247, 249, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .bar {
      max-width: 1480px;
      margin: 0 auto;
      padding: 14px 18px;
      display: grid;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .controls {
      display: grid;
      grid-template-columns: 150px 180px 160px minmax(220px, 1fr) 150px 150px;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    select,
    input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      padding: 7px 9px;
      font: inherit;
    }

    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    main {
      max-width: 1480px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 10px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .metric b {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .table-wrap {
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      max-height: calc(100vh - 230px);
    }

    table {
      width: 100%;
      min-width: 1180px;
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef1f5;
      color: #38404a;
      text-align: left;
      font-size: 12px;
      font-weight: 750;
    }

    td.option {
      white-space: normal;
      min-width: 280px;
      max-width: 420px;
      font-weight: 620;
    }

    td.raw {
      white-space: normal;
      min-width: 220px;
      max-width: 340px;
      color: var(--muted);
      font-size: 12px;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: #edf0f4;
      color: #3f4752;
      font-size: 12px;
      font-weight: 700;
    }

    .grade-유니크 { background: #e7f1ff; color: #16558f; }
    .grade-DX유니크 { background: #e1f3ef; color: #0f6b63; }
    .grade-ULT유니크후보 { background: #fff1dc; color: #8a4b0f; }
    .diff { background: var(--warn-soft); color: var(--warn); font-weight: 750; }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
      .table-wrap { max-height: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>장비 개방 옵션 데이터</h1>
      <div class="controls">
        <label>
          장비
          <select id="equipmentFilter"></select>
        </label>
        <label>
          등급
          <select id="gradeFilter"></select>
        </label>
        <label>
          개방 순서
          <select id="lineFilter"></select>
        </label>
        <label>
          검색
          <input id="searchInput" type="search" placeholder="옵션명, option_id, 수치 검색">
        </label>
        <button id="diffToggle" type="button">확률 차이만</button>
        <button id="resetButton" type="button">초기화</button>
      </div>
    </div>
  </header>

  <main>
    <section class="summary" id="summary"></section>
    <section class="table-wrap" id="tableWrap"></section>
  </main>

  <script>
    const dataUrl = "data/processed/all_equipment_open_options.csv";
    const state = {
      rows: [],
      equipment: "전체",
      grade: "전체",
      line: "전체",
      query: "",
      diffOnly: false,
    };

    const columns = [
      ["장비", "장비"],
      ["등급", "등급"],
      ["개방 순서", "개방 순서"],
      ["줄내 순번", "순번"],
      ["옵션", "옵션"],
      ["option_id", "ID"],
      ["수치", "수치"],
      ["일반 확률", "일반"],
      ["개선 확률", "개선"],
      ["원본 옵션명", "원본"],
      ["source_file_offset", "offset"],
    ];

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let field = "";
      let quoted = false;
      const normalized = text.replace(/^\uFEFF/, "");
      for (let i = 0; i < normalized.length; i += 1) {
        const char = normalized[i];
        const next = normalized[i + 1];
        if (quoted) {
          if (char === '"' && next === '"') {
            field += '"';
            i += 1;
          } else if (char === '"') {
            quoted = false;
          } else {
            field += char;
          }
        } else if (char === '"') {
          quoted = true;
        } else if (char === ",") {
          row.push(field);
          field = "";
        } else if (char === "\n") {
          row.push(field);
          if (row.some((value) => value !== "")) rows.push(row);
          row = [];
          field = "";
        } else if (char !== "\r") {
          field += char;
        }
      }
      if (field || row.length) {
        row.push(field);
        rows.push(row);
      }
      const header = rows.shift();
      return rows.map((values) => Object.fromEntries(header.map((key, index) => [key, values[index] ?? ""])));
    }

    function gradeClass(value) {
      return `grade-${value.replace(/\s+/g, "")}`;
    }

    function pctNumber(value) {
      return Number(String(value).replace("%", ""));
    }

    function hasProbabilityDiff(row) {
      return pctNumber(row["일반 확률"]) !== pctNumber(row["개선 확률"]);
    }

    function filteredRows() {
      const query = state.query.trim().toLowerCase();
      return state.rows.filter((row) => {
        if (state.equipment !== "전체" && row["장비"] !== state.equipment) return false;
        if (state.grade !== "전체" && row["등급"] !== state.grade) return false;
        if (state.line !== "전체" && row["개방 순서"] !== state.line) return false;
        if (state.diffOnly && !hasProbabilityDiff(row)) return false;
        if (!query) return true;
        return [
          row["옵션"],
          row["원본 옵션명"],
          row["option_id"],
          row["수치"],
          row["장비"],
          row["등급"],
          row["개방 순서"],
        ].join(" ").toLowerCase().includes(query);
      });
    }

    function fillSelect(id, values) {
      const select = document.getElementById(id);
      select.innerHTML = values.map((value) => `<option value="${value}">${value}</option>`).join("");
    }

    function renderSummary(rows) {
      const grades = new Set(rows.map((row) => row["등급"]));
      const equipment = new Set(rows.map((row) => row["장비"]));
      const optionIds = new Set(rows.map((row) => row["option_id"]));
      const diffs = rows.filter(hasProbabilityDiff).length;
      const maxValue = rows.reduce((max, row) => Math.max(max, Number(row.value_low16 || 0)), 0);
      document.getElementById("summary").innerHTML = [
        ["표시 row", rows.length],
        ["장비 수", equipment.size],
        ["등급 수", grades.size],
        ["option_id 수", optionIds.size],
        ["확률 차이 row", diffs],
        ["최대 원시 수치", maxValue],
      ].map(([label, value]) => `<div class="metric"><b>${value}</b><span>${label}</span></div>`).join("");
    }

    function renderTable(rows) {
      const wrap = document.getElementById("tableWrap");
      if (!rows.length) {
        wrap.innerHTML = '<div class="empty">표시할 데이터가 없습니다.</div>';
        return;
      }
      const head = `<thead><tr>${columns.map(([, label]) => `<th>${label}</th>`).join("")}</tr></thead>`;
      const body = rows.map((row) => {
        const diff = hasProbabilityDiff(row);
        return `<tr>${columns.map(([key]) => {
          const value = row[key] ?? "";
          if (key === "장비") return `<td><span class="tag">${value}</span></td>`;
          if (key === "등급") return `<td><span class="tag ${gradeClass(value)}">${value}</span></td>`;
          if (key === "옵션") return `<td class="option">${value}</td>`;
          if (key === "원본 옵션명") return `<td class="raw">${value}</td>`;
          if (["줄내 순번", "option_id", "수치", "일반 확률", "개선 확률"].includes(key)) {
            const className = diff && ["일반 확률", "개선 확률"].includes(key) ? "num diff" : "num";
            return `<td class="${className}">${value}</td>`;
          }
          return `<td>${value}</td>`;
        }).join("")}</tr>`;
      }).join("");
      wrap.innerHTML = `<table>${head}<tbody>${body}</tbody></table>`;
    }

    function render() {
      const rows = filteredRows();
      renderSummary(rows);
      renderTable(rows);
      document.getElementById("diffToggle").classList.toggle("active", state.diffOnly);
    }

    function bindControls() {
      const equipment = ["전체", ...Array.from(new Set(state.rows.map((row) => row["장비"])))];
      const grades = ["전체", ...Array.from(new Set(state.rows.map((row) => row["등급"])))];
      const lines = ["전체", "첫째줄", "둘째줄", "셋째줄", "넷째줄"];
      fillSelect("equipmentFilter", equipment);
      fillSelect("gradeFilter", grades);
      fillSelect("lineFilter", lines);

      document.getElementById("equipmentFilter").addEventListener("change", (event) => {
        state.equipment = event.target.value;
        render();
      });
      document.getElementById("gradeFilter").addEventListener("change", (event) => {
        state.grade = event.target.value;
        render();
      });
      document.getElementById("lineFilter").addEventListener("change", (event) => {
        state.line = event.target.value;
        render();
      });
      document.getElementById("searchInput").addEventListener("input", (event) => {
        state.query = event.target.value;
        render();
      });
      document.getElementById("diffToggle").addEventListener("click", () => {
        state.diffOnly = !state.diffOnly;
        render();
      });
      document.getElementById("resetButton").addEventListener("click", () => {
        state.equipment = "전체";
        state.grade = "전체";
        state.line = "전체";
        state.query = "";
        state.diffOnly = false;
        document.getElementById("equipmentFilter").value = "전체";
        document.getElementById("gradeFilter").value = "전체";
        document.getElementById("lineFilter").value = "전체";
        document.getElementById("searchInput").value = "";
        render();
      });
    }

    async function main() {
      const response = await fetch(dataUrl);
      if (!response.ok) throw new Error(`CSV load failed: ${response.status}`);
      state.rows = parseCsv(await response.text());
      bindControls();
      render();
    }

    main().catch((error) => {
      document.getElementById("tableWrap").innerHTML = `<div class="empty">${error.message}</div>`;
    });
  </script>
</body>
</html>
